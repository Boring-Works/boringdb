name = "chartdb"
compatibility_date = "2026-03-08"
compatibility_flags = ["nodejs_compat"]
main = "./worker.ts"
workers_dev = false

# Route is managed in the Cloudflare dashboard — do NOT declare here
# or wrangler deploy will fail with "route already exists" (code 10020)
# routes = [
#   { pattern = "db.getboring.io/*", zone_name = "getboring.io" }
# ]

[vars]
AI_MODEL = "gpt-oss-120b"
AI_DIAGRAM_MODEL = "qwen2.5-coder-32b-instruct"

[ai]
binding = "AI"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true
