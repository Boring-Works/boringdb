name = "chartdb"
compatibility_date = "2026-03-08"
compatibility_flags = ["nodejs_compat"]
main = "./worker.ts"
workers_dev = false

[[routes]]
pattern = "db.getboring.io"
custom_domain = true

[vars]
AI_MODEL = "nemotron-3-120b"
AI_DIAGRAM_MODEL = "nemotron-3-120b"

[ai]
binding = "AI"

[assets]
directory = "./dist"
not_found_handling = "single-page-application"
binding = "ASSETS"
run_worker_first = true
